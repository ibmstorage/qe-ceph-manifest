name: Validate manifest YAML

on:
  pull_request:
    paths:
      - '**/*.yaml'
      - '**/*.yml'
      - 'scripts/validate_manifests.py'
      - '.github/workflows/validate-manifests.yaml'
  push:
    branches: [main]
    paths:
      - '**/*.yaml'
      - '**/*.yml'
      - 'scripts/validate_manifests.py'
      - '.github/workflows/validate-manifests.yaml'

jobs:
  yaml-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install PyYAML
        run: pip install -r requirements.txt

      - name: Validate all manifest YAML files
        run: python3 scripts/validate_manifests.py
